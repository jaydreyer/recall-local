# Recall.local - Additional Services (Approach B)
# Existing Ollama/Qdrant/n8n/Open WebUI services stay as-is.

services:
  mkdocs:
    image: squidfunk/mkdocs-material:latest
    container_name: recall-mkdocs
    ports:
      - "8100:8000"
    volumes:
      - ../docs:/docs
      - ../data/artifacts:/docs/docs/artifacts:ro
    restart: unless-stopped

networks:
  default:
    name: recall-net
